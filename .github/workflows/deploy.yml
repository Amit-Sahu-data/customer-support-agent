name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up environment
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> .env
          echo "LANGCHAIN_TRACING_V2=true" >> .env
          echo "LANGCHAIN_PROJECT=customer-support-agent-ci" >> .env
          echo "LANGCHAIN_ENDPOINT=https://api.smith.langchain.com" >> .env

      - name: Initialize knowledge base
        run: python knowledge_base/loader.py

      - name: Test classifier
        run: python tests/test_classifier.py

      - name: Test knowledge base
        run: python tests/test_knowledge_base.py

      - name: Test database
        run: python tests/test_database.py

      - name: Quality gate
        run: python tests/test_quality_gate.py

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Pipeline status
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "All tests passed! Ready to deploy."
          else
            echo "Tests failed! Deployment blocked."
            exit 1
          fi